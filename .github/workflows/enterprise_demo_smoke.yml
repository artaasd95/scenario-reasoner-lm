name: Enterprise Demo Smoke Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-enterprise.txt

      - name: Run offline demo (CLI)
        env:
          LLM_PROVIDER: offline
        run: |
          python scripts/run_enterprise_demo.py \
            --filing acme_corp_10k \
            --offline \
            --output ./artifacts/smoke_test

      - name: Run offline demo (pytest integration test)
        env:
          LLM_PROVIDER: offline
        run: |
          python -m pytest tests/integration/test_enterprise_demo_smoke.py -v

      - name: Export artifacts
        env:
          LLM_PROVIDER: offline
        run: |
          python scripts/export_demo_artifacts.py \
            --filing acme_corp_10k \
            --output ./artifacts/smoke_export

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: demo-artifacts
          path: |
            artifacts/smoke_test/
            artifacts/smoke_export/

      - name: Validate JSON output
        run: |
          python -c "
          import json
          from pathlib import Path
          result_file = Path('artifacts/smoke_test/demo_result.json')
          if result_file.exists():
              result = json.loads(result_file.read_text())
              assert 'scenarios' in result, 'Missing scenarios in output'
              assert len(result['scenarios']) > 0, 'No scenarios generated'
              assert 'trace_id' in result, 'Missing trace_id'
              print(f'✓ Validated {len(result[\"scenarios\"])} scenarios')
          else:
              print('✗ No demo output found')
              exit(1)
          "
