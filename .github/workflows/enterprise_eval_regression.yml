# S4-05: Enterprise eval regression (TEMPLATE — manual only)
#
# Do not enable on push until baseline gates are stable and API budget is approved.
# Smoke mode uses offline stubs; no paid API keys required.

name: Enterprise Eval Regression (manual)

on:
  workflow_dispatch:
    inputs:
      run_mipro:
        description: "Also run MIPRO comparison (requires ENABLE_MIPRO and API keys)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Disabled for automatic CI — development env reserves resources
# Uncomment when S4-05 gates are ready:
# on:
#   pull_request:
#     branches: [main, develop]

jobs:
  bootstrap-eval-regression:
    if: false  # TEMPLATE: set to true when enabling workflow_dispatch-only runs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-enterprise.txt

      - name: Run offline BootstrapFewShot eval
        env:
          LLM_PROVIDER: offline
        run: |
          python scripts/run_enterprise_eval.py --offline --optimizer BootstrapFewShot

      - name: Regression tests vs baseline_scores.json
        env:
          LLM_PROVIDER: offline
        run: |
          python -m pytest tests/integration/test_enterprise_eval_regression.py -v

  mipro-comparison-optional:
    if: false  # TEMPLATE: enable manually via workflow_dispatch when baseline stable
    needs: bootstrap-eval-regression
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Optional MIPRO comparison
        env:
          ENABLE_MIPRO: "1"
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'offline' }}
        run: |
          python scripts/compare_enterprise_optimizers.py --dry-run
